<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime HLS + ASS Renderer</title>
    
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #333;
            background: #2c2c2c;
            color: white;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            background-color: #bb86fc;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #a370f7;
        }

        .artplayer-app {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        #status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #888;
        }
    </style>

    <!-- 1. ArtPlayer Base -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    
    <!-- 2. HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js/dist/hls.min.js"></script>
    
    <!-- 3. ArtPlayer LibASS Plugin (Corrected Link) -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-libass/dist/artplayer-plugin-libass.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>Anime HLS Stream Tester</h2>
        <div class="input-group">
            <input type="text" id="metaInput" placeholder="Paste metadata.json URL here">
            <button onclick="initPlayer()">Load Stream</button>
        </div>

        <div class="artplayer-app" id="artplayer"></div>
        <div id="status">Ready to load...</div>
    </div>

    <script>
        let art = null;

        async function initPlayer() {
            const url = document.getElementById('metaInput').value.trim();
            const status = document.getElementById('status');
            
            if (!url) {
                alert("Please enter a URL");
                return;
            }

            try {
                status.textContent = "Fetching metadata...";
                
                const response = await fetch(url);
                if (!response.ok) throw new Error("Failed to fetch metadata.json");
                const data = await response.json();

                status.textContent = `Loading: ${data.series_title} - ${data.episode_name}`;

                if (art) {
                    art.destroy();
                }

                // Prepare the subtitle URL
                const subtitleUrl = data.ass_subtitles && data.ass_subtitles.length > 0 ? data.ass_subtitles[0] : null;

                art = new Artplayer({
                    container: '#artplayer',
                    url: data.hls_manifest_url,
                    title: data.episode_name,
                    poster: data.poster_url || '',
                    volume: 0.7,
                    isLive: false,
                    autoplay: true,
                    setting: true,
                    pip: true,
                    fullscreen: true,

                    customType: {
                        m3u8: function (video, url) {
                            if (Hls.isSupported()) {
                                const hls = new Hls();
                                hls.loadSource(url);
                                hls.attachMedia(video);
                                this.on('destroy', () => hls.destroy());
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = url;
                            } else {
                                art.notice.show = 'Does not support playback of HLS';
                            }
                        },
                    },

                    plugins: [
                        // The CORRECT plugin usage
                        artplayerPluginLibass({
                            // Subtitle file URL
                            url: subtitleUrl,
                            
                            // Fonts array from your JSON
                            fonts: data.fonts || [],
                            
                            // Essential: URL to the WebAssembly worker
                            // This CDN link contains the heavy lifting WASM code
                            workerUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@2.5.207/build/pdf.worker.min.js', // Fallback, usually auto-resolved, but explicit is safer
                            // Actually, let's use the JASSUB worker directly:
                            workerUrl: 'https://cdn.jsdelivr.net/npm/jassub@3.0.0/dist/jassub-worker.min.js',
                            wasmUrl: 'https://cdn.jsdelivr.net/npm/jassub@3.0.0/dist/jassub-worker.wasm'
                        }),
                    ],
                });

                art.on('ready', () => {
                    console.log("Player Ready");
                });

            } catch (error) {
                console.error(error);
                status.textContent = "Error: " + error.message;
            }
        }
    </script>
</body>
</html>
