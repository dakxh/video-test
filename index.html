<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artplayer | Advanced External Override Tester</title>

    <script src="https://cdn.jsdelivr.net/npm/artplayer@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-jassub@1.0.0/dist/artplayer-plugin-jassub.js"></script>

    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --primary: #4A90E2;
            --danger: #e24a4a;
            --text: #e0e0e0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1100px;
        }
        .header-box {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; color: #fff; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px;}
        .input-group {
            display: flex;
            gap: 10px;
        }
        input, select {
            flex: 1;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #252525;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: var(--primary); }
        button {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #357ABD; }
        
        #external-controls {
            display: none;
            background: #111;
            border: 1px solid #333;
            border-left: 4px solid var(--danger);
        }
        .control-row {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }
        .control-group label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        #player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #stream-info {
            margin-top: 20px;
            background: var(--panel-bg);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.6;
            display: none;
        }
        .tag {
            background: #333;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-right: 8px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>1. Stream Metadata Source</h2>
        <div class="input-group">
            <input type="text" id="jsonUrl" placeholder="Enter JSON Metadata URL..." 
                   value="https://huggingface.co/datasets/Gravatar44/anime/resolve/main/Teasing.Master.Takagi-San.1080p/Season.03/Episode.11/metadata.json">
            <button onclick="loadStream()">Load Player</button>
        </div>
    </div>

    <div class="header-box" id="external-controls">
        <h2>2. External Overrides (Force-Feed)</h2>
        <div class="control-row">
            <div class="control-group">
                <label for="audioSelect">Force Audio Track</label>
                <select id="audioSelect" onchange="forceAudioTrack()">
                    <option value="">Loading Audio...</option>
                </select>
            </div>
            <div class="control-group">
                <label for="subSelect">Force Subtitle Track</label>
                <select id="subSelect" onchange="forceSubTrack()">
                    <option value="">Loading Subtitles...</option>
                </select>
            </div>
        </div>
    </div>

    <div id="player-wrapper"></div>
    <div id="stream-info"></div>
</div>

<script>
    let art = null;
    let globalHls = null; 

    async function loadStream() {
        const urlInput = document.getElementById('jsonUrl').value.trim();
        if (!urlInput) {
            alert('Please enter a valid URL.');
            return;
        }

        try {
            const response = await fetch(urlInput);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const metadata = await response.json();
            
            initializePlayer(metadata);
            renderMetadataInfo(metadata);
            
        } catch (error) {
            console.error("Failed to load metadata:", error);
            alert(`Error loading metadata: ${error.message}`);
        }
    }

    function initializePlayer(metadata) {
        if (typeof window.artplayerPluginJassub === 'undefined') {
            alert("Critical Error: artplayerPluginJassub did not load.");
            return;
        }

        if (art) {
            art.destroy(true);
            art = null;
        }

        // Reset global initialization state for the new stream
        window.audioTracksInitialized = false;

        const subtitles = metadata.ass_subtitles || [];
        const fonts = metadata.fonts || [];
        const subSelect = document.getElementById('subSelect');
        subSelect.innerHTML = '';
        
        if (subtitles.length > 0) {
            subtitles.forEach((subItem, index) => {
                const isString = typeof subItem === 'string';
                const subUrl = isString ? subItem : subItem.url;
                
                let name = `Subtitle Track ${index + 1}`;
                if (!isString && subItem.label) {
                    name = subItem.label;
                } else {
                    const match = subUrl.match(/subs_\d+_(.*?)\.ass/i);
                    if (match) name = match[1].replace(/_/g, ' ');
                }

                const opt = document.createElement('option');
                opt.value = subUrl;
                opt.text = decodeURIComponent(name);
                subSelect.appendChild(opt);
            });
        } else {
            subSelect.innerHTML = '<option value="">No subtitles available</option>';
            subSelect.disabled = true;
        }

        document.getElementById('external-controls').style.display = 'block';

        const artOptions = {
            container: '#player-wrapper',
            url: metadata.hls_manifest_url,
            type: 'm3u8',
            volume: 0.7,
            autoplay: false,
            setting: false, 
            customType: {
                m3u8: function (video, url, artInstance) {
                    if (Hls.isSupported()) {
                        if (artInstance.hls) artInstance.hls.destroy();
                        
                        const hls = new Hls();
                        globalHls = hls; 
                        
                        hls.loadSource(url);
                        hls.attachMedia(video);
                        artInstance.hls = hls;
                        
                        artInstance.on('destroy', () => hls.destroy());

                        hls.on(Hls.Events.AUDIO_TRACKS_UPDATED, function (_, data) {
                            if (window.audioTracksInitialized) return; // Prevent loop overrides
                            
                            const audioSelect = document.getElementById('audioSelect');
                            audioSelect.innerHTML = '';
                            
                            if (data.audioTracks && data.audioTracks.length > 0) {
                                window.audioTracksInitialized = true;
                                
                                data.audioTracks.forEach((track, index) => {
                                    const opt = document.createElement('option');
                                    opt.value = index; // Strictly bind to the array index
                                    opt.text = track.name || track.language || `Audio Track ${index + 1}`;
                                    
                                    // FIXED: Ignore the broken DEFAULT=YES flags from the manifest.
                                    // Base the UI selection entirely on what HLS actually decided to play.
                                    if (index === hls.audioTrack) {
                                        opt.selected = true;
                                    }
                                    
                                    audioSelect.appendChild(opt);
                                });
                            } else {
                                audioSelect.innerHTML = '<option value="">No alternative audio</option>';
                                audioSelect.disabled = true;
                            }
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                    }
                }
            }
        };

        if (subtitles.length > 0) {
            const firstSubUrl = typeof subtitles[0] === 'string' ? subtitles[0] : subtitles[0].url;

            artOptions.plugins = [
                window.artplayerPluginJassub({
                    debug: false,
                    subUrl: firstSubUrl, 
                    fonts: fonts,         
                    workerUrl: './jassub-worker.js',
                    wasmUrl: 'https://cdn.jsdelivr.net/npm/jassub@latest/dist/jassub-worker.wasm',
                })
            ];
        }

        art = new Artplayer(artOptions);
    }

    // --- BRUTE FORCE EXTERNAL OVERRIDE METHODS ---

    function forceAudioTrack() {
        if (globalHls) {
            const audioSelect = document.getElementById('audioSelect');
            const selectedIndex = parseInt(audioSelect.value, 10);
            
            // Push the new index to HLS.js. This will immediately trigger a network fetch for the new .m3u8
            globalHls.audioTrack = selectedIndex;
            console.log("Forced HLS Audio Track to Index:", selectedIndex);
        }
    }

    function forceSubTrack() {
        if (art && art.plugins && art.plugins.artplayerPluginJassub) {
            const subSelect = document.getElementById('subSelect');
            const selectedUrl = subSelect.value;
            const p = art.plugins.artplayerPluginJassub;
            
            if (typeof p.switchSubtitle === 'function') p.switchSubtitle(selectedUrl);
            else if (typeof p.switch === 'function') p.switch(selectedUrl);
            else if (typeof p.setTrackByUrl === 'function') p.setTrackByUrl(selectedUrl);
            else if (p.jassub && typeof p.jassub.setTrackByUrl === 'function') p.jassub.setTrackByUrl(selectedUrl);
            else if (p.instance && typeof p.instance.setTrackByUrl === 'function') p.instance.setTrackByUrl(selectedUrl);
            
            console.log("Forced JASSUB Subtitle Track to URL:", selectedUrl);
        }
    }

    function renderMetadataInfo(data) {
        const infoDiv = document.getElementById('stream-info');
        infoDiv.style.display = 'block';
        infoDiv.innerHTML = `
            <div style="margin-bottom: 10px;">
                <span class="tag">${data.quality || 'Unknown Quality'}</span>
                <span class="tag">${data.size || 'Unknown Size'}</span>
                <span class="tag">${data.duration || 'Unknown Duration'}</span>
            </div>
            <strong>${data.series_title || data.title || 'Unknown Series'}</strong> &nbsp;&mdash;&nbsp; 
            Season ${String(data.season_number || 1).padStart(2, '0')} Episode ${String(data.episode_number || 1).padStart(2, '0')}: <em>${data.episode_name || data.movie_title || 'N/A'}</em><br>
            <div style="margin-top: 5px; color: #888; font-size: 0.85rem;">
                Original File: ${data.original_filename || 'N/A'}
            </div>
        `;
    }
</script>

</body>
</html>
