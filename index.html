<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Player - Raw Engine Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.3.5/dist/hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/jassub@1.0.6/dist/jassub.js"></script>
</head>
<body class="bg-neutral-950 text-neutral-200 min-h-screen p-8 font-sans">

    <div class="max-w-5xl mx-auto space-y-8">
        <header class="space-y-2">
            <h1 class="text-3xl font-bold text-white tracking-tight">Raw JASSUB + Artplayer</h1>
            <p class="text-neutral-400">Guaranteed WebAssembly Subtitle Rendering & Switching.</p>
        </header>

        <section class="bg-neutral-900/50 p-6 rounded-xl border border-neutral-800 space-y-4">
            <div class="space-y-1.5">
                <label class="text-xs font-semibold text-neutral-400 uppercase tracking-wider">
                    Video Manifest (master.m3u8)
                </label>
                <input
                    id="m3u8-input"
                    type="text"
                    placeholder="https://huggingface.co/.../master.m3u8"
                    class="w-full bg-neutral-950 border border-neutral-800 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition-colors text-white"
                />
            </div>
            <button
                onclick="loadStream()"
                class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg transition-colors"
            >
                Load Stream
            </button>
        </section>

        <div class="w-full aspect-video rounded-xl overflow-hidden shadow-2xl border border-neutral-800 bg-black">
            <div id="artplayer-app" class="w-full h-full"></div>
        </div>
    </div>

    <script>
        let art = null; 
        let jassub = null; // ⚡ We control the engine instance globally now

        async function loadStream() {
            const inputUrl = document.getElementById('m3u8-input').value.trim();
            if (!inputUrl) return alert("Please paste a master.m3u8 link!");

            const metadataUrl = inputUrl.replace('master.m3u8', 'metadata.json');
            let assUrls = [];
            let fontUrls = [];

            try {
                const res = await fetch(metadataUrl);
                if (res.ok) {
                    const data = await res.json();
                    if (data.ass_subtitles) assUrls = data.ass_subtitles;
                    if (data.fonts) fontUrls = data.fonts;
                }
            } catch (error) {
                console.warn("No metadata.json found.");
            }

            // Cleanup previous instances safely
            if (jassub) {
                jassub.destroy();
                jassub = null;
            }
            if (art) {
                art.destroy(false);
                art = null;
            }

            const defaultSubUrl = assUrls.length > 0 ? assUrls[0] : "";
            const subtitleSelector = assUrls.map((url, index) => {
                const match = url.match(/subs_\d+_(.*?)\.ass/);
                const langName = match ? match[1].toUpperCase() : `Track ${index + 1}`;
                return { default: index === 0, html: langName, url: url };
            });
            subtitleSelector.push({ default: assUrls.length === 0, html: "Off", url: "" });

            // 1. Boot up Artplayer normally
            art = new Artplayer({
                container: '#artplayer-app',
                url: inputUrl,
                title: "Anime Test",
                theme: "#3b82f6",
                volume: 1,
                autoSize: true,
                playbackRate: true,
                setting: true,
                fullscreen: true,
                fullscreenWeb: true,
                playsInline: true,
                
                customType: {
                    m3u8: function (video, url, art) {
                        if (Hls.isSupported()) {
                            if (art.hls) art.hls.destroy();

                            const hls = new Hls({
                                maxBufferSize: 30 * 1000 * 1000, 
                                maxMaxBufferLength: 30,
                            });

                            hls.loadSource(url);
                            hls.attachMedia(video);
                            art.hls = hls;

                            hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                                const videoLevelIndex = data.levels.findIndex(lvl => lvl.width > 0 || lvl.height > 0);
                                if (videoLevelIndex !== -1) {
                                    hls.startLevel = videoLevelIndex; 
                                    hls.currentLevel = videoLevelIndex; 
                                }

                                if (hls.audioTracks.length > 1) {
                                    const audioOptions = hls.audioTracks.map((track, index) => ({
                                        default: track.default,
                                        html: track.name || `Audio ${index + 1}`,
                                        id: track.id,
                                    }));

                                    art.setting.add({
                                        name: "audio-tracks",
                                        html: "Audio Track",
                                        tooltip: audioOptions.find(t => t.default)?.html || "Default",
                                        selector: audioOptions,
                                        onSelect: function (item) {
                                            hls.audioTrack = item.id;
                                            return item.html;
                                        },
                                    });
                                }
                            });

                            art.on("destroy", () => hls.destroy());
                        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                            video.src = url; 
                        }
                    }
                }
            });

            // ⚡ 2. ONCE THE PLAYER IS READY, WE ATTACH THE SUBTITLE ENGINE ⚡
            art.on('ready', () => {
                
                // Initialize JASSUB Native Engine directly onto the video element
                jassub = new JASSUB({
                    video: art.video,
                    subUrl: defaultSubUrl,
                    fonts: fontUrls,
                    // Must match the files in your GitHub Pages repo!
                    workerUrl: "./jassub-worker.js",
                    wasmUrl: "./jassub-worker.wasm",
                    targetFps: 60,
                    debug: false
                });

                // Manually build the Subtitle menu inside Artplayer's UI
                if (assUrls.length > 0) {
                    art.setting.add({
                        name: "subtitle-tracks",
                        html: "Subtitles",
                        tooltip: subtitleSelector.find(s => s.default)?.html || "Off",
                        selector: subtitleSelector,
                        onSelect: function (item) {
                            if (item.url === "") {
                                jassub.freeTrack(); // Safely clears the canvas
                            } else {
                                jassub.setTrackByUrl(item.url); // Hot-swaps natively!
                            }
                            return item.html;
                        },
                    });
                }
            });
        }
    </script>
</body>
</html>
