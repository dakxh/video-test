<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazarus Prototype Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        body {
            background-color: #000000;
            color: #EDEDED;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
        }
        
        /* Custom Track Controls Box */
        .track-controls {
            display: flex;
            gap: 1rem;
            background: #1A1A1A;
            padding: 1rem;
            border-radius: 8px 8px 0 0;
            border: 1px solid #333;
            border-bottom: none;
            justify-content: flex-end;
            display: none; /* Hidden until video loads */
        }
        .track-controls select {
            background: #000;
            color: #fff;
            border: 1px solid #444;
            padding: 0.5rem;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        
        .video-container {
            margin-bottom: 2rem;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
            background: #111;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h2 {
            font-weight: 500;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }
        #catalog-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }
        .catalog-item {
            background: #1A1A1A;
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            border: 1px solid #222;
        }
        .catalog-item:hover {
            background: #2A2A2A;
            transform: scale(1.02);
        }
        .item-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }
        .item-meta {
            font-size: 0.85rem;
            color: #888;
        }
        #loading {
            color: #888;
            font-style: italic;
        }
        
        /* Force Plyr to hide its broken native caption button */
        .plyr__controls [data-plyr="captions"] {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="track-controls" id="track-controls">
            <div>
                <label for="audio-select" style="font-size: 0.85rem; color: #888; margin-right: 0.5rem;">Audio:</label>
                <select id="audio-select"></select>
            </div>
            <div>
                <label for="sub-select" style="font-size: 0.85rem; color: #888; margin-right: 0.5rem;">Subtitles:</label>
                <select id="sub-select"></select>
            </div>
        </div>

        <div class="video-container">
            <video id="player" controls crossorigin playsinline></video>
        </div>

        <h2>Available Media</h2>
        <div id="loading">Scanning Hugging Face CDN...</div>
        <ul id="catalog-list"></ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        const REPO = 'Gravatar44/record';
        const videoElement = document.getElementById('player');
        const listContainer = document.getElementById('catalog-list');
        const loadingIndicator = document.getElementById('loading');
        
        const trackControls = document.getElementById('track-controls');
        const audioSelect = document.getElementById('audio-select');
        const subSelect = document.getElementById('sub-select');
        
        let currentHls = null;
        let plyrInstance = null;

        function initPlayer() {
            // Initialize Plyr but DISABLE its native caption handling so HLS.js can take over
            plyrInstance = new Plyr(videoElement, {
                captions: { active: false, update: false }
            });
        }

        function playVideo(manifestUrl, title) {
            if (currentHls) {
                currentHls.destroy();
            }

            if (Hls.isSupported()) {
                currentHls = new Hls({
                    fragLoadingTimeOut: 60000,
                    manifestLoadingTimeOut: 60000,
                    fragLoadingMaxRetry: 10,
                    fragLoadingRetryDelay: 500,
                    maxBufferLength: 60,
                    maxMaxBufferLength: 120,
                    maxBufferSize: 60 * 1000 * 1000,
                    maxFragLookUpTolerance: 0.5,
                    enableWorker: true,
                    lowLatencyMode: false,
                    // Crucial: Tell HLS.js to render subtitles directly to the video element
                    renderTextTracksNatively: true 
                });
                
                currentHls.loadSource(manifestUrl);
                currentHls.attachMedia(videoElement);
                
                // When Manifest is parsed, extract the tracks
                currentHls.on(Hls.Events.MANIFEST_PARSED, function () {
                    videoElement.play();
                    
                    // Show our custom controls
                    trackControls.style.display = 'flex';
                    
                    // 1. Populate Audio Tracks
                    audioSelect.innerHTML = '';
                    currentHls.audioTracks.forEach((track, index) => {
                        const option = document.createElement('option');
                        option.value = index;
                        option.textContent = track.name || `Audio ${index + 1}`;
                        audioSelect.appendChild(option);
                    });
                    
                    // 2. Populate Subtitle Tracks
                    subSelect.innerHTML = '<option value="-1">Off</option>';
                    currentHls.subtitleTracks.forEach((track, index) => {
                        const option = document.createElement('option');
                        option.value = index;
                        option.textContent = track.name || `Subtitle ${index + 1}`;
                        subSelect.appendChild(option);
                    });

                    // Set initial values
                    audioSelect.value = currentHls.audioTrack;
                    subSelect.value = currentHls.subtitleTrack;
                });

            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                videoElement.src = manifestUrl;
                videoElement.addEventListener('loadedmetadata', function () {
                    videoElement.play();
                });
                // Note: Safari native HLS handles audio/subs via its own UI, so we hide ours
                trackControls.style.display = 'none';
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            console.log("Playing:", title);
        }

        // Handle Audio Change
        audioSelect.addEventListener('change', (e) => {
            if(currentHls) currentHls.audioTrack = parseInt(e.target.value);
        });

        // Handle Subtitle Change
        subSelect.addEventListener('change', (e) => {
            if(currentHls) currentHls.subtitleTrack = parseInt(e.target.value);
        });

        async function loadCatalog() {
            try {
                const treeRes = await fetch(`https://huggingface.co/api/datasets/${REPO}/tree/main?recursive=true`);
                const tree = await treeRes.json();
                const metadataFiles = tree.filter(f => f.path.endsWith('metadata.json'));
                loadingIndicator.style.display = 'none';

                for (const file of metadataFiles) {
                    const metaRes = await fetch(`https://huggingface.co/datasets/${REPO}/raw/main/${file.path}`);
                    const data = await metaRes.json();

                    if (data.hls_manifest_url) {
                        const li = document.createElement('li');
                        li.className = 'catalog-item';
                        
                        let displayTitle = data.title;
                        if (file.path.includes('/Season')) {
                            const showName = file.path.split('/')[0].replace(/\./g, ' ');
                            displayTitle = `${showName} - ${data.title}`;
                        }

                        li.innerHTML = `
                            <div class="item-title">${displayTitle}</div>
                            <div class="item-meta">${data.quality || 'HD'} • ${data.size || ''}</div>
                        `;
                        
                        li.onclick = () => playVideo(data.hls_manifest_url, displayTitle);
                        listContainer.appendChild(li);
                    }
                }
            } catch (error) {
                console.error("Error fetching catalog:", error);
                loadingIndicator.textContent = "Failed to load catalog. Check console.";
            }
        }

        initPlayer();
        loadCatalog();
    </script>
</body>
</html>
