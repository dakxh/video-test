<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime HLS + ASS Renderer</title>
    
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #333;
            background: #2c2c2c;
            color: white;
            border-radius: 4px;
        }

        button {
            padding: 10px 20px;
            background-color: #bb86fc;
            color: #000;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #a370f7;
        }

        .artplayer-app {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            position: relative;
        }

        #status {
            margin-top: 10px;
            font-size: 0.9em;
            color: #888;
            font-family: monospace;
        }
    </style>

    <!-- 1. ArtPlayer Base -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    
    <!-- 2. HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    
    <!-- 3. ArtPlayer ASS Plugin (Version Pinned) -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-ass@1.0.9/dist/artplayer-plugin-ass.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>Anime HLS Stream Tester</h2>
        <div class="input-group">
            <input type="text" id="metaInput" placeholder="Paste metadata.json URL here">
            <button onclick="initPlayer()">Load Stream</button>
        </div>

        <div class="artplayer-app" id="artplayer"></div>
        <div id="status">Waiting for input...</div>
    </div>

    <script>
        let art = null;

        async function initPlayer() {
            const url = document.getElementById('metaInput').value.trim();
            const status = document.getElementById('status');
            
            // SAFETY CHECK: Ensure the plugin loaded
            if (typeof artplayerPluginAss === 'undefined') {
                status.textContent = "CRITICAL ERROR: artplayer-plugin-ass failed to load from CDN.";
                return;
            }

            if (!url) {
                alert("Please enter a URL");
                return;
            }

            try {
                status.textContent = "Fetching metadata...";
                
                const response = await fetch(url);
                if (!response.ok) throw new Error("Failed to fetch metadata.json");
                const data = await response.json();

                status.textContent = `Initializing: ${data.series_title} - ${data.episode_name}`;

                if (art) {
                    art.destroy();
                }

                // Prepare the subtitle URL
                const subtitleUrl = data.ass_subtitles && data.ass_subtitles.length > 0 ? data.ass_subtitles[0] : null;

                art = new Artplayer({
                    container: '#artplayer',
                    url: data.hls_manifest_url,
                    title: data.episode_name,
                    poster: data.poster_url || '',
                    volume: 0.7,
                    isLive: false,
                    autoplay: true,
                    setting: true,
                    pip: true,
                    fullscreen: true,

                    // HLS Integration
                    customType: {
                        m3u8: function (video, url) {
                            if (Hls.isSupported()) {
                                const hls = new Hls();
                                hls.loadSource(url);
                                hls.attachMedia(video);
                                this.on('destroy', () => hls.destroy());
                            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                                video.src = url;
                            } else {
                                art.notice.show = 'Does not support playback of HLS';
                            }
                        },
                    },

                    // ASS Plugin Integration
                    plugins: [
                        artplayerPluginAss({
                            // 1. The Subtitle File
                            subUrl: subtitleUrl,
                            
                            // 2. The Fonts (Passed directly from your JSON)
                            fonts: data.fonts || [],
                            
                            // 3. CRITICAL: Explicitly point to the worker files
                            // This prevents "Worker not found" errors
                            workerUrl: 'https://cdn.jsdelivr.net/npm/subtitles-octopus@4.0.0/dist/subtitles-octopus-worker.js',
                            legacyWorkerUrl: 'https://cdn.jsdelivr.net/npm/subtitles-octopus@4.0.0/dist/subtitles-octopus-worker-legacy.js'
                        })
                    ],
                });

                art.on('ready', () => {
                    status.textContent = `Playing: ${data.episode_name}`;
                    console.log("Player Ready");
                });
                
                art.on('error', (error) => {
                    status.textContent = "Player Error: " + error;
                });

            } catch (error) {
                console.error(error);
                status.textContent = "Error: " + error.message;
            }
        }
    </script>
</body>
</html>
