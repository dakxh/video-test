<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artplayer | Advanced HLS & JASSUB Tester</title>

    <script src="https://cdn.jsdelivr.net/npm/artplayer@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-jassub@1.0.0/dist/artplayer-plugin-jassub.js"></script>

    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --primary: #4A90E2;
            --text: #e0e0e0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1100px;
        }
        .header-box {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; color: #fff; font-size: 1.4rem; }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #252525;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        button {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #357ABD; }
        #player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #stream-info {
            margin-top: 20px;
            background: var(--panel-bg);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.6;
            display: none;
        }
        .tag {
            background: #333;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-right: 8px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>Stream Metadata Source</h2>
        <div class="input-group">
            <input type="text" id="jsonUrl" placeholder="Enter JSON Metadata URL..." 
                   value="https://huggingface.co/datasets/Gravatar44/anime/resolve/main/Teasing.Master.Takagi-San.1080p/Season.03/Episode.11/metadata.json">
            <button onclick="loadStream()">Load & Play</button>
        </div>
    </div>

    <div id="player-wrapper"></div>
    <div id="stream-info"></div>
</div>

<script>
    let art = null;

    async function loadStream() {
        const urlInput = document.getElementById('jsonUrl').value.trim();
        if (!urlInput) {
            alert('Please enter a valid URL.');
            return;
        }

        try {
            const response = await fetch(urlInput);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const metadata = await response.json();
            
            initializePlayer(metadata);
            renderMetadataInfo(metadata);
            
        } catch (error) {
            console.error("Failed to load metadata:", error);
            alert(`Error loading metadata: ${error.message}`);
        }
    }

    function initializePlayer(metadata) {
        // Strict dependency check tailored to the new JASSUB plugin
        if (typeof window.artplayerPluginJassub === 'undefined') {
            const errorMsg = "Critical Error: artplayerPluginJassub did not load. Please check your network or ad-blocker.";
            console.error(errorMsg);
            alert(errorMsg);
            return;
        }

        if (art) {
            art.destroy(true);
            art = null;
        }

        const hlsUrl = metadata.hls_manifest_url;
        const subtitles = metadata.ass_subtitles || [];
        const fonts = metadata.fonts || [];

        const subSelector = subtitles.map((subUrl, index) => {
            const match = subUrl.match(/subs_\d+_(.*?)\.ass/i);
            const name = match ? match[1].replace(/_/g, ' ') : `Subtitle Track ${index + 1}`;
            return {
                default: index === 0,
                html: name,
                url: subUrl
            };
        });

        const artOptions = {
            container: '#player-wrapper',
            url: hlsUrl,
            type: 'm3u8',
            volume: 0.7,
            isLive: false,
            muted: false,
            autoplay: false,
            pip: true,
            autoSize: true,
            autoMini: true,
            setting: true,
            loop: false,
            flip: true,
            playbackRate: true,
            aspectRatio: true,
            fullscreen: true,
            fullscreenWeb: true,
            subtitleOffset: false,
            miniProgressBar: true,
            mutex: true,
            backdrop: true,
            playsInline: true,
            autoPlayback: true,
            airplay: true,
            theme: '#4A90E2',
            settings: [],
            customType: {
                m3u8: function (video, url, artInstance) {
                    if (Hls.isSupported()) {
                        if (artInstance.hls) artInstance.hls.destroy();
                        const hls = new Hls();
                        hls.loadSource(url);
                        hls.attachMedia(video);
                        artInstance.hls = hls;
                        
                        artInstance.on('destroy', () => hls.destroy());

                        hls.on(Hls.Events.MANIFEST_PARSED, function () {
                            const audioTracks = hls.audioTracks;
                            if (audioTracks && audioTracks.length > 1) {
                                const audioSelector = audioTracks.map((track, index) => ({
                                    html: track.name || track.language || `Audio Track ${index + 1}`,
                                    audioId: track.id,
                                    default: track.default || index === hls.audioTrack
                                }));

                                artInstance.setting.add({
                                    html: 'Audio Track',
                                    width: 250,
                                    tooltip: audioSelector.find(t => t.default)?.html || audioSelector[0].html,
                                    selector: audioSelector,
                                    onSelect: function (item) {
                                        hls.audioTrack = item.audioId;
                                        return item.html;
                                    }
                                });
                            }
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                    } else {
                        artInstance.notice.show = 'Unsupported playback format: m3u8';
                    }
                }
            }
        };

        // Inject the new JASSUB plugin
        if (subtitles.length > 0) {
            artOptions.plugins = [
                window.artplayerPluginJassub({
                    debug: false,
                    subUrl: subtitles[0], 
                    fonts: fonts,         
                    // Fetch latest WebAssembly workers securely to prevent execution blocks
                    workerUrl: './jassub-worker.js',
                    wasmUrl: 'https://cdn.jsdelivr.net/npm/jassub@latest/dist/jassub-worker.wasm',
                })
            ];

            if (subtitles.length > 1) {
                artOptions.settings.push({
                    html: 'Subtitles',
                    width: 250,
                    tooltip: subSelector[0].html,
                    selector: subSelector,
                    onSelect: function (item) {
                        const jassubPlugin = art.plugins.artplayerPluginJassub;
                        if (jassubPlugin) {
                            // Bulletproof fallback chain for method resolution in v1.0.0
                            if (typeof jassubPlugin.switchSubtitle === 'function') {
                                jassubPlugin.switchSubtitle(item.url);
                            } else if (typeof jassubPlugin.switch === 'function') {
                                jassubPlugin.switch(item.url);
                            } else if (jassubPlugin.setTrackByUrl) {
                                jassubPlugin.setTrackByUrl(item.url);
                            } else {
                                console.error("Could not find a valid track-switching method on artplayerPluginJassub.");
                            }
                        }
                        return item.html;
                    }
                });
            }
        }

        art = new Artplayer(artOptions);
    }

    function renderMetadataInfo(data) {
        const infoDiv = document.getElementById('stream-info');
        infoDiv.style.display = 'block';
        infoDiv.innerHTML = `
            <div style="margin-bottom: 10px;">
                <span class="tag">${data.quality || 'Unknown Quality'}</span>
                <span class="tag">${data.size || 'Unknown Size'}</span>
                <span class="tag">${data.duration || 'Unknown Duration'}</span>
            </div>
            <strong>${data.series_title || 'Unknown Series'}</strong> &nbsp;&mdash;&nbsp; 
            Season ${String(data.season_number).padStart(2, '0')} Episode ${String(data.episode_number).padStart(2, '0')}: <em>${data.episode_name || 'N/A'}</em><br>
            <div style="margin-top: 5px; color: #888; font-size: 0.85rem;">
                Original File: ${data.original_filename || 'N/A'}
            </div>
        `;
    }
</script>

</body>
</html>
