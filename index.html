<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artplayer | Advanced External Override Tester (CORS Fix)</title>

    <script src="https://cdn.jsdelivr.net/npm/artplayer@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-jassub@1.0.0/dist/artplayer-plugin-jassub.js"></script>

    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1a1a1a;
            --primary: #4A90E2;
            --danger: #e24a4a;
            --text: #e0e0e0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1100px;
        }
        .header-box {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; color: #fff; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px;}
        .input-group {
            display: flex;
            gap: 10px;
        }
        input, select {
            flex: 1;
            padding: 12px 15px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #252525;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, select:focus { border-color: var(--primary); }
        button {
            padding: 12px 24px;
            border-radius: 6px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #357ABD; }
        
        #external-controls {
            display: none;
            background: #111;
            border: 1px solid #333;
            border-left: 4px solid var(--danger);
        }
        .control-row {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 8px;
        }
        .control-group label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }

        #player-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        #stream-info {
            margin-top: 20px;
            background: var(--panel-bg);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.6;
            display: none;
        }
        .tag {
            background: #333;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-right: 8px;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h2>1. Stream Metadata Source</h2>
        <div class="input-group">
            <input type="text" id="jsonUrl" placeholder="Enter JSON Metadata URL..." 
                   value="https://huggingface.co/buckets/nookaharsha/anime/resolve/Chainsaw.Man.The.Movie.Reze.Arc.1080p.SDR/metadata.json">
            <button onclick="loadStream()">Load Player</button>
        </div>
    </div>

    <div class="header-box" id="external-controls">
        <h2>2. External Overrides (Force-Feed)</h2>
        <div class="control-row">
            <div class="control-group">
                <label for="audioSelect">Force Audio Track</label>
                <select id="audioSelect" onchange="forceAudioTrack()">
                    <option value="">Loading Audio...</option>
                </select>
            </div>
            <div class="control-group">
                <label for="subSelect">Force Subtitle Track</label>
                <select id="subSelect" onchange="forceSubTrack()">
                    <option value="">Loading Subtitles...</option>
                </select>
            </div>
        </div>
    </div>

    <div id="player-wrapper"></div>
    <div id="stream-info"></div>
</div>

<script>
    let art = null;
    let globalHls = null; 

    // --- HF MISSING CORS REDIRECT BUCKET PROXY FIX (Replaces broken direct headers natively) ---
    const CORS_PROXY_BASE = "https://xkca.dadalapathy756.workers.dev/?url=";

    function generateProperResolvedHfPath(u) {
        if (!u || typeof u !== 'string') return u;
        let sanitized = u.replace(/[?&]download=true/g, '');
        // Transforms base visual routes silently
        return sanitized.replace(/^(https?:\/\/huggingface\.co\/buckets\/[^/]+\/[^/]+)\/(?!resolve\/)(.*)$/i, '$1/resolve/$2');
    }

    function ensureCorsHeaderProxy(rawAbsoluteUrl) {
        // Enforces wildcard CORS access explicitly to bypass blocked Buckets API natively 
        const urlToFetch = generateProperResolvedHfPath(rawAbsoluteUrl);
        if (urlToFetch.includes('huggingface.co/buckets/')) {
            return CORS_PROXY_BASE + encodeURIComponent(urlToFetch);
        }
        return urlToFetch;
    }
    // -----------------------------------------------------------------------------------------

    async function loadStream() {
        let inputUrl = document.getElementById('jsonUrl').value.trim();
        if (!inputUrl) {
            alert('Please enter a valid URL.');
            return;
        }

        try {
            // Apply CORS Override proxy manually to main payload fetches
            const safeMetadataApiTarget = ensureCorsHeaderProxy(inputUrl);

            const response = await fetch(safeMetadataApiTarget);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            let metadata = await response.json();
            
            // Sanitize metadata variables natively inside RAM state
            if (metadata.hls_manifest_url) metadata.hls_manifest_url = generateProperResolvedHfPath(metadata.hls_manifest_url);
            
            // Subtitle tracks heavily break under missing CORS too! Let's ensure proxy wraps JS font requests securely
            if (metadata.fonts) {
                metadata.fonts = metadata.fonts.map(f => ensureCorsHeaderProxy(f));
            }
            if (metadata.ass_subtitles) {
                metadata.ass_subtitles = metadata.ass_subtitles.map(sub => {
                    const rawTargetUrl = generateProperResolvedHfPath(typeof sub === 'string' ? sub : sub.url);
                    const safeProxiedSubURL = ensureCorsHeaderProxy(rawTargetUrl);
                    return typeof sub === 'string' ? safeProxiedSubURL : { ...sub, url: safeProxiedSubURL };
                });
            }

            initializePlayer(metadata);
            renderMetadataInfo(metadata);
            
        } catch (error) {
            console.error("Failed to load metadata:", error);
            alert(`Error loading metadata: ${error.message} - Confirm link exists natively or CORS proxy hasn't rotated limit thresholds.`);
        }
    }

    function initializePlayer(metadata) {
        if (typeof window.artplayerPluginJassub === 'undefined') {
            alert("Critical Error: artplayerPluginJassub did not load.");
            return;
        }

        if (art) {
            art.destroy(true);
            art = null;
        }

        window.audioTracksInitialized = false;

        const subtitles = metadata.ass_subtitles || [];
        const fonts = metadata.fonts ||[];
        const subSelect = document.getElementById('subSelect');
        subSelect.innerHTML = '';
        
        if (subtitles.length > 0) {
            subtitles.forEach((subItem, index) => {
                const subUrl = typeof subItem === 'string' ? subItem : subItem.url;
                let name = `Subtitle Track ${index + 1}`;
                
                if (typeof subItem !== 'string' && subItem.label) {
                    name = subItem.label;
                }
                
                const opt = document.createElement('option');
                opt.value = subUrl;
                opt.text = decodeURIComponent(name);
                subSelect.appendChild(opt);
            });
        } else {
            subSelect.innerHTML = '<option value="">No subtitles available</option>';
            subSelect.disabled = true;
        }

        document.getElementById('external-controls').style.display = 'block';

        const artOptions = {
            container: '#player-wrapper',
            url: metadata.hls_manifest_url, 
            type: 'm3u8',
            volume: 0.7,
            autoplay: false,
            setting: false, 
            customType: {
                m3u8: function (video, url, artInstance) {
                    if (Hls.isSupported()) {
                        if (artInstance.hls) artInstance.hls.destroy();

                        // --- BUCKET CORS BYPASS NETWORK LEVEL LOADER REVERSE ENGINEERED ----
                        class HfBucketsProxyLoader extends Hls.DefaultConfig.loader {
                            load(context, config, callbacks) {
                                if (context.url) {
                                    // HLS computes exact relative string links itself to Absolute string structures natively 
                                    // Our custom XHR Loader grabs its output internally and shunts only actual Outbound API routing through the headers! 
                                    context.url = ensureCorsHeaderProxy(context.url);
                                }
                                super.load(context, config, callbacks);
                            }
                        }
                        
                        const hls = new Hls({
                            loader: HfBucketsProxyLoader
                        });
                        globalHls = hls; 
                        // -------------------------------------------------------------------

                        hls.loadSource(url);
                        hls.attachMedia(video);
                        artInstance.hls = hls;
                        
                        artInstance.on('destroy', () => hls.destroy());

                        hls.on(Hls.Events.AUDIO_TRACKS_UPDATED, function (_, data) {
                            if (window.audioTracksInitialized) return; 
                            const audioSelect = document.getElementById('audioSelect');
                            audioSelect.innerHTML = '';
                            
                            if (data.audioTracks && data.audioTracks.length > 0) {
                                window.audioTracksInitialized = true;
                                data.audioTracks.forEach((track, index) => {
                                    const opt = document.createElement('option');
                                    opt.value = index; 
                                    opt.text = track.name || track.language || `Audio Track ${index + 1}`;
                                    if (index === hls.audioTrack) opt.selected = true;
                                    audioSelect.appendChild(opt);
                                });
                            } else {
                                audioSelect.innerHTML = '<option value="">No alternative audio</option>';
                                audioSelect.disabled = true;
                            }
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url; // Fallback Apple generic payload systems. Usually bypass standard Web browser limits uniquely on iOS safari natively
                    }
                }
            }
        };

        if (subtitles.length > 0) {
            const firstSubUrl = typeof subtitles[0] === 'string' ? subtitles[0] : subtitles[0].url;

            artOptions.plugins =[
                window.artplayerPluginJassub({
                    debug: false,
                    subUrl: firstSubUrl, 
                    fonts: fonts,         
                    workerUrl: './jassub-worker.js',
                    wasmUrl: 'https://cdn.jsdelivr.net/npm/jassub@latest/dist/jassub-worker.wasm',
                })
            ];
        }

        art = new Artplayer(artOptions);
    }

    function forceAudioTrack() {
        if (globalHls) {
            const audioSelect = document.getElementById('audioSelect');
            const selectedIndex = parseInt(audioSelect.value, 10);
            globalHls.audioTrack = selectedIndex;
        }
    }

    function forceSubTrack() {
        if (art && art.plugins && art.plugins.artplayerPluginJassub) {
            const subSelect = document.getElementById('subSelect');
            const selectedUrl = subSelect.value;
            const p = art.plugins.artplayerPluginJassub;
            
            if (typeof p.switchSubtitle === 'function') p.switchSubtitle(selectedUrl);
            else if (typeof p.switch === 'function') p.switch(selectedUrl);
            else if (typeof p.setTrackByUrl === 'function') p.setTrackByUrl(selectedUrl);
            else if (p.jassub && typeof p.jassub.setTrackByUrl === 'function') p.jassub.setTrackByUrl(selectedUrl);
            else if (p.instance && typeof p.instance.setTrackByUrl === 'function') p.instance.setTrackByUrl(selectedUrl);
        }
    }

    function renderMetadataInfo(data) {
        const infoDiv = document.getElementById('stream-info');
        infoDiv.style.display = 'block';
        infoDiv.innerHTML = `
            <div style="margin-bottom: 10px;">
                <span class="tag">${data.quality || 'Unknown Quality'}</span>
                <span class="tag">${data.size || 'Unknown Size'}</span>
                <span class="tag">${data.duration || 'Unknown Duration'}</span>
            </div>
            <strong>${data.series_title || data.title || 'Unknown Series'}</strong> &nbsp;&mdash;&nbsp; 
            Season ${String(data.season_number || 1).padStart(2, '0')} Episode ${String(data.episode_number || 1).padStart(2, '0')}: <em>${data.episode_name || data.movie_title || 'N/A'}</em><br>
            <div style="margin-top: 5px; color: #888; font-size: 0.85rem;">
                Original File: ${data.original_filename || 'N/A'}
            </div>
        `;
    }
</script>

</body>
</html>
