<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazarus Prototype Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        body {
            background-color: #000000;
            color: #EDEDED;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
        }
        .video-container {
            margin-bottom: 2rem;
            border-radius: 8px;
            overflow: hidden;
            background: #111;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h2 {
            font-weight: 500;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }
        #catalog-list {
            list-style: none;
            padding: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }
        .catalog-item {
            background: #1A1A1A;
            padding: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            border: 1px solid #222;
        }
        .catalog-item:hover {
            background: #2A2A2A;
            transform: scale(1.02);
        }
        .item-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.25rem;
        }
        .item-meta {
            font-size: 0.85rem;
            color: #888;
        }
        #loading {
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-container">
            <video id="player" controls crossorigin playsinline></video>
        </div>

        <h2>Available Media</h2>
        <div id="loading">Scanning Hugging Face CDN...</div>
        <ul id="catalog-list"></ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

    <script>
        const REPO = 'Gravatar44/record';
        const videoElement = document.getElementById('player');
        const listContainer = document.getElementById('catalog-list');
        const loadingIndicator = document.getElementById('loading');
        
        let currentHls = null;
        let plyrInstance = null;

        // 1. Initialize Video Player
        function initPlayer() {
            plyrInstance = new Plyr(videoElement, {
                captions: { active: true, update: true, language: 'en' }
            });
        }

        // 2. Load Video Stream
        function playVideo(manifestUrl, title) {
            // Destroy previous HLS instance if it exists
            if (currentHls) {
                currentHls.destroy();
            }

            if (Hls.isSupported()) {
                currentHls = new Hls({
                    // 1. Network & Timeout Forgiveness (Crucial for HF CDN Redirects)
                    fragLoadingTimeOut: 60000,       // Wait up to 60 seconds for a chunk
                    manifestLoadingTimeOut: 60000,
                    fragLoadingMaxRetry: 10,         // Retry 10 times before giving up
                    fragLoadingRetryDelay: 500,
                    
                    // 2. Buffer Aggressiveness (Keep memory usage safe but buffer deep)
                    maxBufferLength: 60,             // Buffer 60 seconds ahead
                    maxMaxBufferLength: 120,         // Maximum buffer allowed
                    maxBufferSize: 60 * 1000 * 1000, // Up to 60MB of RAM for the buffer
                    
                    // 3. Seeking & Keyframe Forgiveness (Crucial for -c:v copy)
                    maxFragLookUpTolerance: 0.5,     // Allow slight desyncs in keyframes
                    enableWorker: true,              // Use Web Workers to prevent UI freezing
                    lowLatencyMode: false            // We are VOD, not Twitch. Disable this.
                });
                
                currentHls.loadSource(manifestUrl);
                currentHls.attachMedia(videoElement);
                currentHls.on(Hls.Events.MANIFEST_PARSED, function () {
                    videoElement.play();
                });
            } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
                // For Safari (Native HLS Support)
                videoElement.src = manifestUrl;
                videoElement.addEventListener('loadedmetadata', function () {
                    videoElement.play();
                });
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
            console.log("Playing:", title);
        }

        // 3. Fetch Data from Hugging Face
        async function loadCatalog() {
            try {
                // Fetch the entire repository tree
                const treeRes = await fetch(`https://huggingface.co/api/datasets/${REPO}/tree/main?recursive=true`);
                const tree = await treeRes.json();

                // Find all metadata.json files
                const metadataFiles = tree.filter(f => f.path.endsWith('metadata.json'));
                
                loadingIndicator.style.display = 'none';

                for (const file of metadataFiles) {
                    // Fetch the actual JSON content
                    const metaRes = await fetch(`https://huggingface.co/datasets/${REPO}/raw/main/${file.path}`);
                    const data = await metaRes.json();

                    // We only want to list playable files (Movies or TV Episodes)
                    if (data.hls_manifest_url) {
                        const li = document.createElement('li');
                        li.className = 'catalog-item';
                        
                        // Formatting TV Shows (e.g. "Gachiakuta - Episode 01")
                        let displayTitle = data.title;
                        if (file.path.includes('/Season')) {
                            const showName = file.path.split('/')[0].replace(/\./g, ' ');
                            displayTitle = `${showName} - ${data.title}`;
                        }

                        li.innerHTML = `
                            <div class="item-title">${displayTitle}</div>
                            <div class="item-meta">${data.quality || 'HD'} • ${data.size || ''}</div>
                        `;
                        
                        li.onclick = () => playVideo(data.hls_manifest_url, displayTitle);
                        listContainer.appendChild(li);
                    }
                }
            } catch (error) {
                console.error("Error fetching catalog:", error);
                loadingIndicator.textContent = "Failed to load catalog. Check console.";
            }
        }

        // Boot up
        initPlayer();
        loadCatalog();
    </script>
</body>
</html>
